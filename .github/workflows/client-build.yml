name: Client build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install and build
        working-directory: client
        run: |
          npm ci
          CI=false npm run build
      - name: Verify student enrollment UI is in bundle
        working-directory: client
        run: |
          grep -q "Generate automatically" build/static/js/main.*.js
          grep -q "student_id_mode" build/static/js/main.*.js
          echo "Student ID enrollment UI present in production bundle"
